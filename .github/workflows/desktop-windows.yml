name: 桌面端 Windows 打包

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: '是否上传生成的 Windows 安装包到 GitHub Release。'
        required: false
        type: boolean
        default: false
      release_type:
        description: '发布类型。正式版写入 stable 更新通道；预发行版写入 preview 更新通道。'
        required: true
        type: choice
        default: '预发行版'
        options:
          - '正式版'
          - '预发行版'
      release_tag:
        description: 'Release 标签。留空自动生成；也可写 v{{VERSION}} 作为版本占位。'
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COGNINOTE_DESKTOP_VERSION: 0.1.51

jobs:
  build-windows:
    name: 构建 Windows 桌面安装包
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          architecture: x64
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: cogniNote-agent-front/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve Windows signing mode
        id: windows-signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $hasCertificate = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PFX_BASE64)
          $hasPassword = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)
          if ($hasCertificate -xor $hasPassword) {
            throw 'Configure both WINDOWS_CERTIFICATE_PFX_BASE64 and WINDOWS_CERTIFICATE_PASSWORD, or leave both empty for an unsigned test build.'
          }

          if ($hasCertificate -and $hasPassword) {
            'require_signing=true' >> $env:GITHUB_OUTPUT
            'artifact_suffix=signed' >> $env:GITHUB_OUTPUT
            Write-Host 'Windows signing secrets found; building signed distribution artifacts.'
          } else {
            'require_signing=false' >> $env:GITHUB_OUTPUT
            'artifact_suffix=unsigned' >> $env:GITHUB_OUTPUT
            Write-Host 'Windows signing secrets are not configured; building unsigned test artifacts.'
          }

      - name: Build Windows desktop package
        shell: pwsh
        env:
          COGNINOTE_REQUIRE_WINDOWS_SIGNING: ${{ steps.windows-signing.outputs.require_signing }}
          COGNINOTE_TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: .\scripts\build-desktop-app.ps1 -SkipTests

      - name: Sign final Windows artifacts
        if: steps.windows-signing.outputs.artifact_suffix == 'signed'
        shell: pwsh
        env:
          COGNINOTE_REQUIRE_WINDOWS_SIGNING: true
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $artifacts = @(
            Get-ChildItem -LiteralPath 'cogniNote-agent-front/src-tauri/target/release' -Filter '*.exe' -File
            Get-ChildItem -LiteralPath 'cogniNote-agent-front/src-tauri/target/release/bundle/nsis' -Filter '*.exe' -File
          )
          if (-not $artifacts) {
            throw 'Windows exe artifacts were not generated.'
          }
          foreach ($artifact in $artifacts) {
            .\scripts\sign-windows-artifact.ps1 -FilePath $artifact.FullName
          }

      - name: Verify Windows signatures
        if: steps.windows-signing.outputs.artifact_suffix == 'signed'
        shell: pwsh
        run: |
          $artifacts = @(
            Get-ChildItem -LiteralPath 'cogniNote-agent-front/src-tauri/target/release' -Filter '*.exe' -File
            Get-ChildItem -LiteralPath 'cogniNote-agent-front/src-tauri/target/release/bundle/nsis' -Filter '*.exe' -File
          )
          if (-not $artifacts) {
            throw 'Windows exe artifacts were not generated.'
          }
          foreach ($artifact in $artifacts) {
            $signature = Get-AuthenticodeSignature -LiteralPath $artifact.FullName
            if ($signature.Status -ne 'Valid') {
              throw "Invalid signature for $($artifact.FullName): $($signature.Status)"
            }
            Write-Host "Valid signature: $($artifact.FullName)"
          }

      - name: Report unsigned Windows artifacts
        if: steps.windows-signing.outputs.artifact_suffix == 'unsigned'
        shell: pwsh
        run: |
          Write-Host 'Unsigned Windows artifacts were generated for testing only.'
          Write-Host 'Users may see SmartScreen / Unknown Publisher prompts during installation.'

      - name: Prepare Windows portable package
        shell: pwsh
        run: |
          $suffix = '${{ steps.windows-signing.outputs.artifact_suffix }}'
          $version = $env:COGNINOTE_DESKTOP_VERSION
          $portableRoot = 'artifacts/windows-portable/CogniNote'
          New-Item -ItemType Directory -Force -Path $portableRoot | Out-Null

          Copy-Item -LiteralPath 'cogniNote-agent-front/src-tauri/target/release/cogninote-agent.exe' -Destination "$portableRoot/CogniNote.exe" -Force
          Copy-Item -LiteralPath 'cogniNote-agent-front/src-tauri/target/release/backend' -Destination "$portableRoot/backend" -Recurse -Force

          Compress-Archive -LiteralPath $portableRoot -DestinationPath "artifacts/CogniNote-${version}-windows-x64-${suffix}-portable.zip" -Force

      - name: Upload Windows portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CogniNote-${{ env.COGNINOTE_DESKTOP_VERSION }}-windows-x64-${{ steps.windows-signing.outputs.artifact_suffix }}-portable
          path: artifacts/CogniNote-${{ env.COGNINOTE_DESKTOP_VERSION }}-windows-x64-${{ steps.windows-signing.outputs.artifact_suffix }}-portable.zip
          if-no-files-found: error

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CogniNote-${{ env.COGNINOTE_DESKTOP_VERSION }}-windows-x64-${{ steps.windows-signing.outputs.artifact_suffix }}-installer
          path: cogniNote-agent-front/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Prepare Windows release assets
        if: ${{ inputs.publish_release }}
        shell: pwsh
        run: |
          $suffix = '${{ steps.windows-signing.outputs.artifact_suffix }}'
          $version = $env:COGNINOTE_DESKTOP_VERSION
          $assetDir = 'artifacts/windows-release'
          New-Item -ItemType Directory -Force -Path $assetDir | Out-Null

          $installer = Get-ChildItem -LiteralPath 'cogniNote-agent-front/src-tauri/target/release/bundle/nsis' -Filter '*.exe' -File | Select-Object -First 1
          if (-not $installer) {
            throw 'Windows NSIS installer was not generated.'
          }

          Copy-Item -LiteralPath "artifacts/CogniNote-${version}-windows-x64-${suffix}-portable.zip" -Destination "$assetDir/CogniNote-${version}-windows-x64-${suffix}-portable.zip" -Force
          Copy-Item -LiteralPath $installer.FullName -Destination "$assetDir/CogniNote-${version}-windows-x64-${suffix}-installer.exe" -Force

      - name: Publish Windows GitHub Release assets
        if: ${{ inputs.publish_release }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_TYPE_INPUT: ${{ inputs.release_type }}
        run: |
          $suffix = '${{ steps.windows-signing.outputs.artifact_suffix }}'
          $version = $env:COGNINOTE_DESKTOP_VERSION
          $releaseType = $env:RELEASE_TYPE_INPUT.Trim()
          $isPreviewRelease = $releaseType -ne '正式版'
          $releaseKind = if ($isPreviewRelease) { '预发行版' } else { '正式版' }
          $updaterChannel = if ($isPreviewRelease) { 'preview' } else { 'stable' }
          $tag = $env:RELEASE_TAG_INPUT.Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = if ($isPreviewRelease) { "v$version-test.1" } else { "v$version" }
          } else {
            $tag = $tag.Replace('{{VERSION}}', $version).Replace('{version}', $version)
          }

          $notesPath = Join-Path $env:RUNNER_TEMP 'cogninote-desktop-release-notes.md'
          $existingNotesPath = Join-Path $env:RUNNER_TEMP 'cogninote-existing-release-notes.md'
          gh release view $tag *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            gh release view $tag --json body --jq .body | Set-Content -LiteralPath $existingNotesPath -Encoding UTF8
          } else {
            '' | Set-Content -LiteralPath $existingNotesPath -Encoding UTF8
          }

          $installerName = "CogniNote-${version}-windows-x64-${suffix}-installer.exe"
          $portableName = "CogniNote-${version}-windows-x64-${suffix}-portable.zip"
          $signingNote = if ($suffix -eq 'signed') {
            '这是已签名安装包，适合普通用户分发。'
          } else {
            '这是未签名包。安装时如果提示“未知发布者”或 SmartScreen，请选择“更多信息” -> “仍要运行”。'
          }
          node scripts/render-desktop-release-notes.mjs `
            --existing $existingNotesPath `
            --output $notesPath `
            --version $version `
            --releaseKind $releaseKind `
            --platform windows `
            --template .github/release-templates/desktop-windows.md `
            --updaterChannel $updaterChannel `
            --windowsInstaller $installerName `
            --windowsPortable $portableName `
            --windowsSigningNote $signingNote

          $releaseTitle = "知记空间 $version 桌面端 $releaseKind"
          if (-not $releaseExists) {
            $createArgs = @('release', 'create', $tag, '--title', $releaseTitle, '--notes-file', $notesPath)
            if ($isPreviewRelease) {
              $createArgs += '--prerelease'
            }
            & gh @createArgs
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub Release $tag."
            }
          } else {
            gh release edit $tag --title $releaseTitle --notes-file $notesPath
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update GitHub Release $tag."
            }
          }
          $release = gh api "repos/$env:GITHUB_REPOSITORY/releases/tags/$tag" | ConvertFrom-Json
          $prereleaseValue = if ($isPreviewRelease) { 'true' } else { 'false' }
          $makeLatestValue = if ($isPreviewRelease) { 'false' } else { 'true' }
          gh api -X PATCH "repos/$env:GITHUB_REPOSITORY/releases/$($release.id)" -F "prerelease=$prereleaseValue" -f "make_latest=$makeLatestValue" *> $null
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to update GitHub Release prerelease flag for $tag."
          }

          $assetPaths = (Get-ChildItem -LiteralPath 'artifacts/windows-release' -File).FullName
          $uploadArgs = @('release', 'upload', $tag) + $assetPaths + @('--clobber')
          & gh @uploadArgs
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload Windows assets to GitHub Release $tag."
          }

      - name: Publish Windows updater manifest
        if: ${{ inputs.publish_release }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_TYPE_INPUT: ${{ inputs.release_type }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          $hasPublicKey = -not [string]::IsNullOrWhiteSpace($env:TAURI_UPDATER_PUBLIC_KEY)
          $hasPrivateKey = -not [string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)
          if ($hasPublicKey -xor $hasPrivateKey) {
            throw 'Configure both TAURI_UPDATER_PUBLIC_KEY and TAURI_SIGNING_PRIVATE_KEY, or leave both empty to skip updater manifest publication.'
          }
          if (-not $hasPrivateKey) {
            Write-Host 'Tauri updater signing key is not configured; skipping updater manifest publication.'
            exit 0
          }

          $suffix = '${{ steps.windows-signing.outputs.artifact_suffix }}'
          $version = $env:COGNINOTE_DESKTOP_VERSION
          $releaseType = $env:RELEASE_TYPE_INPUT.Trim()
          $isPreviewRelease = $releaseType -ne '正式版'
          $tag = $env:RELEASE_TAG_INPUT.Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = if ($isPreviewRelease) { "v$version-test.1" } else { "v$version" }
          } else {
            $tag = $tag.Replace('{{VERSION}}', $version).Replace('{version}', $version)
          }
          $channel = if ($isPreviewRelease) { 'preview' } else { 'stable' }
          $assetName = "CogniNote-${version}-windows-x64-${suffix}-installer.exe"
          $assetPath = "artifacts/windows-release/$assetName"
          $assetFullPath = Join-Path $env:GITHUB_WORKSPACE $assetPath
          if (-not (Test-Path -LiteralPath $assetFullPath)) {
            throw "Windows updater asset not found: $assetFullPath"
          }

          npm --silent --prefix cogniNote-agent-front run tauri -- signer sign --password="$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD" $assetFullPath
          $signaturePath = "$assetFullPath.sig"
          if (-not (Test-Path -LiteralPath $signaturePath)) {
            throw "Tauri updater signature was not generated: $signaturePath"
          }

          $assetUrl = "https://github.com/ItQianChen/cogninote-agent-design/releases/download/$tag/$assetName"

          function Initialize-PagesWorktree {
            param([Parameter(Mandatory = $true)][string]$TargetDir)

            if (Test-Path -LiteralPath $TargetDir) {
              Remove-Item -LiteralPath $TargetDir -Recurse -Force
            }

            $remote = "https://x-access-token:$env:GH_TOKEN@github.com/$env:GITHUB_REPOSITORY.git"
            $branchRef = git ls-remote --heads $remote gh-pages
            if ($LASTEXITCODE -ne 0) {
              throw 'Failed to inspect gh-pages branch.'
            }

            if ($branchRef) {
              git clone --depth 1 --branch gh-pages $remote $TargetDir
            } else {
              New-Item -ItemType Directory -Force -Path $TargetDir | Out-Null
              git -C $TargetDir init
              git -C $TargetDir checkout -b gh-pages
              git -C $TargetDir remote add origin $remote
            }
            if ($LASTEXITCODE -ne 0) {
              throw 'Failed to prepare gh-pages worktree.'
            }

            git -C $TargetDir config user.name 'github-actions[bot]'
            git -C $TargetDir config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          }

          $pagesDir = 'artifacts/updater-pages'
          for ($attempt = 1; $attempt -le 3; $attempt += 1) {
            Initialize-PagesWorktree -TargetDir $pagesDir
            $manifestPath = Join-Path $pagesDir "updater/$channel/latest.json"
            node scripts/build-updater-manifest.mjs `
              --manifest $manifestPath `
              --version $version `
              --platform windows-x86_64 `
              --url $assetUrl `
              --signatureFile $signaturePath `
              --notes "CogniNote $version $suffix"
            if ($LASTEXITCODE -ne 0) {
              throw 'Failed to build updater manifest.'
            }

            New-Item -ItemType File -Force -Path (Join-Path $pagesDir '.nojekyll') | Out-Null
            git -C $pagesDir add .nojekyll "updater/$channel/latest.json"
            $changes = git -C $pagesDir status --porcelain
            if (-not $changes) {
              Write-Host "No updater manifest changes for $channel."
              exit 0
            }

            git -C $pagesDir commit -m "Publish $channel updater manifest for $version ($suffix)"
            if ($LASTEXITCODE -ne 0) {
              throw 'Failed to commit updater manifest.'
            }

            git -C $pagesDir push origin gh-pages
            if ($LASTEXITCODE -eq 0) {
              Write-Host "Published $channel updater manifest to gh-pages."
              exit 0
            }

            Write-Warning "Push to gh-pages failed on attempt $attempt; retrying with a fresh copy."
            Start-Sleep -Seconds ([Math]::Min(10, 2 * $attempt))
          }
          throw "Failed to publish $channel updater manifest to gh-pages."
