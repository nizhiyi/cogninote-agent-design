name: Desktop Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows desktop package
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          architecture: x64
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: cogniNote-agent-front/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows desktop package
        shell: pwsh
        run: .\scripts\build-desktop-app.ps1 -SkipTests

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: CogniNote-windows-exe
          path: cogniNote-agent-front/src-tauri/target/release/*.exe
          if-no-files-found: error

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: CogniNote-windows-installer
          path: cogniNote-agent-front/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
