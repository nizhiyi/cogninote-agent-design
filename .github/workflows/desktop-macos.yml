name: 桌面端 macOS 打包

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: '是否上传生成的 macOS 安装包到 GitHub Release。'
        required: false
        type: boolean
        default: false
      release_type:
        description: '发布类型。正式版写入 stable 更新通道；预发行版写入 preview 更新通道。'
        required: true
        type: choice
        default: '预发行版'
        options:
          - '正式版'
          - '预发行版'
      release_tag:
        description: 'Release 标签。留空自动生成；也可写 v{{VERSION}} 作为版本占位。'
        required: false
        type: string
        default: ''

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  COGNINOTE_DESKTOP_VERSION: 0.1.50

jobs:
  build-macos:
    name: 构建 macOS Apple Silicon 桌面安装包
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          architecture: aarch64

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: cogniNote-agent-front/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm --prefix cogniNote-agent-front ci

      - name: Resolve macOS signing mode
        id: macos-signing
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          required=(
            MACOS_CERTIFICATE_P12_BASE64
            MACOS_CERTIFICATE_PASSWORD
            MACOS_SIGNING_IDENTITY
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
          )

          configured=0
          missing=()
          for name in "${required[@]}"; do
            if [[ -n "${!name:-}" ]]; then
              configured=$((configured + 1))
            else
              missing+=("$name")
            fi
          done

          if [[ "$configured" -eq "${#required[@]}" ]]; then
            echo "signed=true" >> "$GITHUB_OUTPUT"
            echo "artifact_suffix=signed" >> "$GITHUB_OUTPUT"
            echo "macOS signing and notarization secrets found; building signed distribution artifacts."
          elif [[ "$configured" -eq 0 ]]; then
            echo "signed=false" >> "$GITHUB_OUTPUT"
            echo "artifact_suffix=unsigned" >> "$GITHUB_OUTPUT"
            echo "macOS signing secrets are not configured; building unsigned test artifacts."
          else
            printf 'Incomplete macOS signing secret configuration. Missing: %s\n' "${missing[*]}" >&2
            echo 'Configure all required macOS secrets, or leave all of them empty for an unsigned test build.' >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        if: steps.macos-signing.outputs.signed == 'true'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/cogninote-signing.keychain-db"
          CERTIFICATE_PATH="$RUNNER_TEMP/cogninote-developer-id.p12"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build signed macOS desktop package
        if: steps.macos-signing.outputs.signed == 'true'
        env:
          COGNINOTE_TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_PROVIDER_SHORT_NAME: ${{ secrets.APPLE_PROVIDER_SHORT_NAME }}
        run: |
          set -euo pipefail
          bash ./scripts/build-desktop-app-macos.sh --skip-tests --sign

      - name: Build unsigned macOS desktop package
        if: steps.macos-signing.outputs.signed == 'false'
        env:
          COGNINOTE_TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          bash ./scripts/build-desktop-app-macos.sh --skip-tests

      - name: Verify and notarize macOS artifacts
        if: steps.macos-signing.outputs.signed == 'true'
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP_PATH="$(find cogniNote-agent-front/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          DMG_PATH="$(find cogniNote-agent-front/src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1)"
          BACKEND_APP_PATH="$APP_PATH/Contents/Resources/backend/CogniNoteBackend.app"
          if [[ -z "$APP_PATH" || -z "$DMG_PATH" ]]; then
            echo "macOS .app or .dmg artifact was not generated." >&2
            exit 1
          fi
          if [[ ! -d "$BACKEND_APP_PATH" ]]; then
            echo "Nested backend app was not bundled: $BACKEND_APP_PATH" >&2
            exit 1
          fi

          mkdir -p artifacts/macos
          APP_NOTARY_ZIP="$RUNNER_TEMP/CogniNote-${COGNINOTE_DESKTOP_VERSION}-macos-arm64.notary.zip"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$BACKEND_APP_PATH"
          ditto -c -k --keepParent "$APP_PATH" "$APP_NOTARY_ZIP"

          xcrun notarytool submit "$APP_NOTARY_ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait | tee artifacts/macos/notary-app.log
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl -a -vvv -t exec "$APP_PATH"
          spctl -a -vvv -t exec "$BACKEND_APP_PATH"

          # Tauri creates the DMG before the app is notarized and stapled. Rebuild
          # the signed distribution DMG from the stapled app so the downloaded
          # installer carries the exact bundle that passed Gatekeeper checks.
          STAGED_DMG_ROOT="$RUNNER_TEMP/cogninote-dmg-root"
          rm -rf "$STAGED_DMG_ROOT"
          mkdir -p "$STAGED_DMG_ROOT"
          ditto "$APP_PATH" "$STAGED_DMG_ROOT/CogniNote.app"
          ln -s /Applications "$STAGED_DMG_ROOT/Applications"
          rm -f "$DMG_PATH"
          hdiutil create \
            -volname "CogniNote" \
            -fs HFS+ \
            -format UDZO \
            -srcfolder "$STAGED_DMG_ROOT" \
            "$DMG_PATH"
          codesign --force --timestamp --sign "$MACOS_SIGNING_IDENTITY" "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait | tee artifacts/macos/notary-dmg.log
          xcrun stapler staple "$DMG_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl -a -vvv -t install "$DMG_PATH"

      - name: Report unsigned macOS artifacts
        if: steps.macos-signing.outputs.signed == 'false'
        run: |
          echo 'Unsigned macOS artifacts were generated for testing only.'
          echo 'Downloaded apps may require right-click Open or xattr -cr, and are not suitable for ordinary-user distribution.'

      - name: Archive macOS app bundle
        run: |
          set -euo pipefail
          APP_PATH="$(find cogniNote-agent-front/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          if [[ -z "$APP_PATH" ]]; then
            echo "macOS .app bundle was not generated." >&2
            exit 1
          fi
          mkdir -p artifacts/macos
          ditto -c -k --keepParent "$APP_PATH" "artifacts/macos/CogniNote-${COGNINOTE_DESKTOP_VERSION}-macos-arm64-${{ steps.macos-signing.outputs.artifact_suffix }}.app.zip"

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: CogniNote-${{ env.COGNINOTE_DESKTOP_VERSION }}-macos-arm64-${{ steps.macos-signing.outputs.artifact_suffix }}-app
          path: artifacts/macos/CogniNote-${{ env.COGNINOTE_DESKTOP_VERSION }}-macos-arm64-${{ steps.macos-signing.outputs.artifact_suffix }}.app.zip
          if-no-files-found: error

      - name: Upload macOS dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: CogniNote-${{ env.COGNINOTE_DESKTOP_VERSION }}-macos-arm64-${{ steps.macos-signing.outputs.artifact_suffix }}-dmg
          path: cogniNote-agent-front/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload macOS notarization logs
        if: steps.macos-signing.outputs.signed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: CogniNote-${{ env.COGNINOTE_DESKTOP_VERSION }}-macos-notarization-logs
          path: artifacts/macos/notary-*.log
          if-no-files-found: error

      - name: Prepare macOS release assets
        if: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail
          suffix="${{ steps.macos-signing.outputs.artifact_suffix }}"
          version="$COGNINOTE_DESKTOP_VERSION"
          mkdir -p artifacts/macos-release

          APP_PATH="$(find cogniNote-agent-front/src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' -type d | head -n 1)"
          DMG_PATH="$(find cogniNote-agent-front/src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' -type f | head -n 1)"
          APP_ZIP="artifacts/macos/CogniNote-${version}-macos-arm64-${suffix}.app.zip"
          if [[ -z "$APP_PATH" || -z "$DMG_PATH" || ! -f "$APP_ZIP" ]]; then
            echo "macOS release assets were not generated." >&2
            exit 1
          fi

          cp "$DMG_PATH" "artifacts/macos-release/CogniNote-${version}-macos-arm64-${suffix}.dmg"
          cp "$APP_ZIP" "artifacts/macos-release/CogniNote-${version}-macos-arm64-${suffix}.app.zip"
          tar -czf "artifacts/macos-release/CogniNote-${version}-macos-arm64-${suffix}.app.tar.gz" -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"

      - name: Publish macOS GitHub Release assets
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_TYPE_INPUT: ${{ inputs.release_type }}
        run: |
          set -euo pipefail
          suffix="${{ steps.macos-signing.outputs.artifact_suffix }}"
          version="$COGNINOTE_DESKTOP_VERSION"
          release_type="${RELEASE_TYPE_INPUT:-预发行版}"
          if [[ "$release_type" == "正式版" ]]; then
            is_preview=false
            release_kind="正式版"
            updater_channel="stable"
          else
            is_preview=true
            release_kind="预发行版"
            updater_channel="preview"
          fi
          tag="${RELEASE_TAG_INPUT:-}"
          if [[ -z "$tag" ]]; then
            if [[ "$is_preview" == "true" ]]; then
              tag="v${version}-test.1"
            else
              tag="v${version}"
            fi
          else
            tag="${tag//'{{VERSION}}'/$version}"
            tag="${tag//'{version}'/$version}"
          fi

          notes_path="$RUNNER_TEMP/cogninote-desktop-release-notes.md"
          existing_notes_path="$RUNNER_TEMP/cogninote-existing-release-notes.md"
          if gh release view "$tag" >/dev/null 2>&1; then
            release_exists=true
            gh release view "$tag" --json body --jq .body > "$existing_notes_path"
          else
            release_exists=false
            : > "$existing_notes_path"
          fi

          dmg_name="CogniNote-${version}-macos-arm64-${suffix}.dmg"
          app_zip_name="CogniNote-${version}-macos-arm64-${suffix}.app.zip"
          if [[ "$suffix" == "signed" ]]; then
            signing_note="这是已签名、公证并 stapled 的 DMG，适合普通用户分发。"
          else
            signing_note="$(cat <<'NOTE'
          这是未签名测试版。如果提示“已损坏，无法打开”，请先把 `CogniNote.app` 拖入 `/Applications`，然后执行：

          ```bash
          sudo xattr -dr com.apple.quarantine /Applications/CogniNote.app
          open /Applications/CogniNote.app
          ```

          如果 DMG 本身无法打开，再执行：

          ```bash
          cd ~/Downloads
          xattr -dr com.apple.quarantine ./__MACOS_DMG__
          open ./__MACOS_DMG__
          ```
          NOTE
          )"
            signing_note="${signing_note//__MACOS_DMG__/$dmg_name}"
          fi
          node scripts/render-desktop-release-notes.mjs \
            --existing "$existing_notes_path" \
            --output "$notes_path" \
            --version "$version" \
            --releaseKind "$release_kind" \
            --platform macos \
            --template .github/release-templates/desktop-macos.md \
            --updaterChannel "$updater_channel" \
            --macosDmg "$dmg_name" \
            --macosAppZip "$app_zip_name" \
            --macosSigningNote "$signing_note"

          release_title="知记空间 ${version} 桌面端 ${release_kind}"
          if [[ "$release_exists" == "false" ]]; then
            create_args=(release create "$tag" --title "$release_title" --notes-file "$notes_path")
            if [[ "$is_preview" == "true" ]]; then
              create_args+=(--prerelease)
            fi
            gh "${create_args[@]}"
          else
            gh release edit "$tag" --title "$release_title" --notes-file "$notes_path"
          fi
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" --jq .id)"
          if [[ "$is_preview" == "true" ]]; then
            make_latest=false
          else
            make_latest=true
          fi
          gh api -X PATCH "repos/${GITHUB_REPOSITORY}/releases/${release_id}" -F "prerelease=${is_preview}" -f "make_latest=${make_latest}" >/dev/null

          gh release upload "$tag" artifacts/macos-release/* --clobber

      - name: Publish macOS updater manifest
        if: ${{ inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
          RELEASE_TYPE_INPUT: ${{ inputs.release_type }}
          TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          has_public_key=false
          has_private_key=false
          [[ -n "${TAURI_UPDATER_PUBLIC_KEY:-}" ]] && has_public_key=true
          [[ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]] && has_private_key=true
          if [[ "$has_public_key" != "$has_private_key" ]]; then
            echo 'Configure both TAURI_UPDATER_PUBLIC_KEY and TAURI_SIGNING_PRIVATE_KEY, or leave both empty to skip updater manifest publication.' >&2
            exit 1
          fi
          if [[ "$has_private_key" == "false" ]]; then
            echo 'Tauri updater signing key is not configured; skipping updater manifest publication.'
            exit 0
          fi

          suffix="${{ steps.macos-signing.outputs.artifact_suffix }}"
          version="$COGNINOTE_DESKTOP_VERSION"
          release_type="${RELEASE_TYPE_INPUT:-预发行版}"
          if [[ "$release_type" == "正式版" ]]; then
            is_preview=false
          else
            is_preview=true
          fi
          tag="${RELEASE_TAG_INPUT:-}"
          if [[ -z "$tag" ]]; then
            if [[ "$is_preview" == "true" ]]; then
              tag="v${version}-test.1"
            else
              tag="v${version}"
            fi
          else
            tag="${tag//'{{VERSION}}'/$version}"
            tag="${tag//'{version}'/$version}"
          fi
          if [[ "$is_preview" == "false" ]]; then
            channel="stable"
          else
            channel="preview"
          fi

          asset_name="CogniNote-${version}-macos-arm64-${suffix}.app.tar.gz"
          asset_path="artifacts/macos-release/${asset_name}"
          asset_abs_path="${GITHUB_WORKSPACE}/${asset_path}"
          if [[ ! -f "$asset_abs_path" ]]; then
            echo "macOS updater asset not found: $asset_abs_path" >&2
            exit 1
          fi

          npm --silent --prefix cogniNote-agent-front run tauri -- signer sign --password="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$asset_abs_path"
          signature_path="${asset_abs_path}.sig"
          if [[ ! -f "$signature_path" ]]; then
            echo "Tauri updater signature was not generated: $signature_path" >&2
            exit 1
          fi

          asset_url="https://github.com/ItQianChen/cogninote-agent-design/releases/download/${tag}/${asset_name}"

          init_pages_worktree() {
            local target_dir="$1"
            rm -rf "$target_dir"

            local remote="https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            local branch_ref
            branch_ref="$(git ls-remote --heads "$remote" gh-pages)"
            if [[ -n "$branch_ref" ]]; then
              git clone --depth 1 --branch gh-pages "$remote" "$target_dir"
            else
              mkdir -p "$target_dir"
              git -C "$target_dir" init
              git -C "$target_dir" checkout -b gh-pages
              git -C "$target_dir" remote add origin "$remote"
            fi

            git -C "$target_dir" config user.name 'github-actions[bot]'
            git -C "$target_dir" config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          }

          pages_dir="artifacts/updater-pages"
          for attempt in 1 2 3; do
            init_pages_worktree "$pages_dir"
            manifest_path="${pages_dir}/updater/${channel}/latest.json"
            node scripts/build-updater-manifest.mjs \
              --manifest "$manifest_path" \
              --version "$version" \
              --platform darwin-aarch64 \
              --url "$asset_url" \
              --signatureFile "$signature_path" \
              --notes "CogniNote ${version} ${suffix}"

            touch "${pages_dir}/.nojekyll"
            git -C "$pages_dir" add .nojekyll "updater/${channel}/latest.json"
            if [[ -z "$(git -C "$pages_dir" status --porcelain)" ]]; then
              echo "No updater manifest changes for ${channel}."
              exit 0
            fi

            git -C "$pages_dir" commit -m "Publish ${channel} updater manifest for ${version} (${suffix})"
            if git -C "$pages_dir" push origin gh-pages; then
              echo "Published ${channel} updater manifest to gh-pages."
              exit 0
            fi

            echo "Push to gh-pages failed on attempt ${attempt}; retrying with a fresh copy." >&2
            sleep "$(( attempt * 2 ))"
          done
          echo "Failed to publish ${channel} updater manifest to gh-pages." >&2
          exit 1
