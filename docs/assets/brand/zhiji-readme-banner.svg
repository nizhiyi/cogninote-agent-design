<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">知记空间 CogniNote</title>
  <desc id="desc">知记空间的 README 品牌横幅，包含应用图标、中文显示名和英文工程名。</desc>
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbfd"/>
      <stop offset="1" stop-color="#edf6fb"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172837"/>
      <stop offset="1" stop-color="#07131c"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e8f4f8"/>
    </linearGradient>
    <linearGradient id="orbit" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#47c9ff"/>
      <stop offset="1" stop-color="#1f6eea"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#07131c" flood-opacity="0.12"/>
    </filter>
    <filter id="iconShadow" x="-22%" y="-22%" width="144%" height="144%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#07131c" flood-opacity="0.18"/>
    </filter>
    <style>
      .brand-cn { font: 800 72px "Microsoft YaHei", "Noto Sans SC", "PingFang SC", Arial, sans-serif; fill: #102131; letter-spacing: 0; }
      .brand-en { font: 700 34px "Inter", "Segoe UI", Arial, sans-serif; fill: #1e76b8; letter-spacing: 0; }
      .tagline { font: 400 24px "Microsoft YaHei", "Noto Sans SC", "PingFang SC", Arial, sans-serif; fill: #647789; letter-spacing: 0; }
    </style>
  </defs>

  <rect x="24" y="24" width="1152" height="312" rx="36" fill="url(#bannerBg)" filter="url(#cardShadow)"/>
  <g transform="translate(110 78) scale(0.22)" filter="url(#iconShadow)">
    <g transform="translate(170 170) scale(3.1)">
      <rect width="220" height="220" rx="54" fill="url(#ink)"/>
      <path d="M63 54H146L183 91V164C183 175 174 184 163 184H63C52 184 43 175 43 164V74C43 63 52 54 63 54Z" fill="url(#paper)"/>
      <path d="M146 54V91H183" fill="#d8eaf3"/>
      <path d="M73 113H144M73 140H152" fill="none" stroke="#1e76b8" stroke-width="12" stroke-linecap="round"/>
      <ellipse cx="110" cy="110" rx="130" ry="70" fill="none" stroke="url(#orbit)" stroke-width="10" stroke-linecap="round" transform="rotate(-25 110 110)"/>
      <circle cx="217" cy="54" r="11" fill="#f3a63f"/>
      <circle cx="18" cy="166" r="9" fill="#47c9ff"/>
    </g>
  </g>

  <g transform="translate(370 105)">
    <text x="0" y="70" class="brand-cn">知记空间</text>
    <text x="4" y="120" class="brand-en">CogniNote</text>
    <path d="M4 156H610" stroke="#d9e7ef" stroke-width="2"/>
    <text x="4" y="205" class="tagline">本地优先的个人知识库问答应用</text>
  </g>
</svg>
