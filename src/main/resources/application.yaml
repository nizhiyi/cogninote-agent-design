spring:
  application:
    name: cogninote-agent-design
  ai:
    model:
      chat: none
      image: none
      moderation: none
      video: none
      rerank: none
      audio:
        speech: none
        transcription: none
      embedding: ${COGNINOTE_AI_EMBEDDING_PROVIDER:none}
      embedding.text: ${COGNINOTE_AI_EMBEDDING_PROVIDER:none}
      embedding.multimodal: none
    dashscope:
      api-key: ${COGNINOTE_DASHSCOPE_API_KEY:}
      agent:
        enabled: false
      chat:
        enabled: false
      image:
        enabled: false
      embedding:
        options:
          model: ${COGNINOTE_EMBEDDING_MODEL:text-embedding-v4}

server:
  address: 127.0.0.1
  port: ${COGNINOTE_PORT:18080}

logging:
  file:
    # Spring Boot 业务日志独立落盘；Tauri 的 desktop-backend.log 仍只记录桌面壳启动与 stdout/stderr。
    name: ${COGNINOTE_LOG_FILE:${APPDATA:${user.home}}/CogniNote/logs/app.log}
  logback:
    rollingpolicy:
      max-file-size: 20MB
      max-history: 10

app:
  storage:
    base-dir: ${COGNINOTE_DATA_DIR:}
    database-path: ${COGNINOTE_DATABASE_PATH:}
  search:
    top-k: ${COGNINOTE_SEARCH_TOP_K:8}
    bm25-weight: ${COGNINOTE_BM25_WEIGHT:0.6}
    vector-weight: ${COGNINOTE_VECTOR_WEIGHT:0.4}
  embedding:
    dimensions: ${COGNINOTE_EMBEDDING_DIMENSIONS:1024}
    batch-size: ${COGNINOTE_EMBEDDING_BATCH_SIZE:32}
  chat:
    prompts:
      rag:
        system: |
          你是 CogniNote Agent 的本地知识库问答助手。
          你必须只基于提供的知识库上下文回答，不要编造未出现的信息。
          如果上下文不足以回答，明确说明：当前知识库中没有足够依据。
          回答中必须用 [1]、[2] 这样的编号标注引用来源。
          回答需要基于知识库，然后进行总结与拓展出来，必须详细，使用户容易理解。
        user: |
          用户问题：
          {question}

          知识库上下文：
          {context}

          请给出回答。
        empty-context: 没有检索到相关知识库片段。
      connection-test:
        user: 请用一句话回答：CogniNote 连接测试是否可用？
