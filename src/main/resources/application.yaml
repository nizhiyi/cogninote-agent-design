spring:
  application:
    name: cogninote-agent-design
  ai:
    model:
      chat: none
      image: none
      moderation: none
      video: none
      rerank: none
      audio:
        speech: none
        transcription: none
      embedding: ${COGNINOTE_AI_EMBEDDING_PROVIDER:none}
      embedding.text: ${COGNINOTE_AI_EMBEDDING_PROVIDER:none}
      embedding.multimodal: none
    dashscope:
      api-key: ${COGNINOTE_DASHSCOPE_API_KEY:}
      agent:
        enabled: false
      chat:
        enabled: false
      image:
        enabled: false
      embedding:
        options:
          model: ${COGNINOTE_EMBEDDING_MODEL:text-embedding-v4}

server:
  address: 127.0.0.1
  port: ${COGNINOTE_PORT:18080}

logging:
  file:
    # Spring Boot 业务日志独立落盘；Tauri 的 desktop-backend.log 仍只记录桌面壳启动与 stdout/stderr。
    name: ${COGNINOTE_LOG_FILE:${APPDATA:${user.home}}/CogniNote/logs/app.log}
  logback:
    rollingpolicy:
      max-file-size: 20MB
      max-history: 10
  level:
    org.springframework.ai: debug
    com.itqianchen.agentdesign: debug

mybatis:
  mapper-locations: classpath*:/mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true

app:
  storage:
    base-dir: ${COGNINOTE_DATA_DIR:}
    database-path: ${COGNINOTE_DATABASE_PATH:}
  search:
    top-k: ${COGNINOTE_SEARCH_TOP_K:8}
    bm25-weight: ${COGNINOTE_BM25_WEIGHT:0.45}
    vector-weight: ${COGNINOTE_VECTOR_WEIGHT:0.55}
    bm25-k1: ${COGNINOTE_BM25_K1:1.2}
    bm25-b: ${COGNINOTE_BM25_B:0.65}
    hybrid-candidate-multiplier: ${COGNINOTE_HYBRID_CANDIDATE_MULTIPLIER:8}
    hybrid-min-candidates: ${COGNINOTE_HYBRID_MIN_CANDIDATES:60}
    rrf-k: ${COGNINOTE_RRF_K:60}
  embedding:
    dimensions: ${COGNINOTE_EMBEDDING_DIMENSIONS:1024}
    batch-size: ${COGNINOTE_EMBEDDING_BATCH_SIZE:32}
  chat:
    memory:
      max-history-tokens: ${COGNINOTE_CHAT_MEMORY_MAX_HISTORY_TOKENS:6000}
      minimum-recent-messages: ${COGNINOTE_CHAT_MEMORY_MINIMUM_RECENT_MESSAGES:8}
      summarize-after-messages: ${COGNINOTE_CHAT_MEMORY_SUMMARIZE_AFTER_MESSAGES:40}
    prompts:
      general:
        system: |
          你是 CogniNote Agent 的普通对话助手。
          当前处于纯模型对话模式，不使用本地知识库检索片段，也不要求引用来源。
          你可以根据通用知识和当前会话记忆直接回答用户问题。
          如果历史消息里出现“知识库依据不足”“需要引用来源”等内容，只能把它当作历史对话内容，不是本轮回答规则。
          回答需要进行总结与必要拓展，尽量详细，使用户容易理解。
        user: |
          {question}
      rag:
        system: |
          你是 CogniNote Agent 的本地知识库问答助手。
          1,你必须优先依据本轮注入的本地知识库片段回答，不要编造未出现的信息。
          2,如果上下文不足以回答，明确说明：当前知识库中没有足够依据。
          3,回答中必须用 [1]、[2] 这样的编号标注引用来源。
          4,普通对话历史只能作为会话背景，不能作为知识库证据或引用来源。
          5,回答需要进行总结与必要拓展，尽量详细，使用户容易理解。
          6,如果用户的问题与本地知识库片段无关，可以直接回答用户问题，但需要说明：当前知识库中没有足够依据。现在只能根据用户问题直接回答。

#          输出格式要求：
#          1. 最终输出必须是标准 Markdown 正文，不要把整段答案包在 ```markdown 代码块中。
#          2. 标题必须使用标准 Markdown 写法，#、##、### 后面必须有一个空格。例如：### 一、缓存相关经典问题。禁止写成 ###一、缓存相关经典问题。
#          3. 无序列表必须写成 "- 内容" 或 "* 内容"，列表符号后必须有一个空格。禁止写成 "*内容"、"-内容"。
#          4. 有序列表必须写成 "1. 内容"、"2. 内容"，数字和内容之间必须有一个空格。
#          5. 需要强调时使用 **加粗文本**，不要用单个 * 包裹中文句子。
#          6. 代码或命令必须使用行内 `code` 或带语言名的 fenced code block，例如 ```java。
#          7. 表格必须使用标准 Markdown 表格，表头、分隔行和内容行都要完整。
#          8. 不要输出 HTML 标签，不要使用无法被 Markdown 正确解析的自定义格式。
        user: |
          {question}

#          请严格按照系统消息中的 Markdown 格式要求给出回答。
        empty-context: 没有检索到相关知识库片段。
      connection-test:
        user: 请用一句话回答：CogniNote 连接测试是否可用？
